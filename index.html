<!DOCTYPE html>
<html>
<head>
<title>Gaana Bajaana</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
font-family:'Segoe UI', sans-serif;
background: linear-gradient(-45deg,#0f0f0f,#1a1a2e,#16213e,#0f3460);
background-size:400% 400%;
animation:gradient 15s ease infinite;
color:white;
text-align:center;
}

@keyframes gradient{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

nav{background:black;padding:15px;}
nav a{color:#ffcc00;margin:15px;text-decoration:none;font-weight:bold;}

.hero{padding:120px 20px;}

.section{padding:70px 20px;max-width:900px;margin:auto;}

.btn{
background:linear-gradient(45deg,#ffcc00,#ff512f);
padding:15px 35px;border-radius:50px;
text-decoration:none;color:black;font-weight:bold;
font-size:18px;display:inline-block;
box-shadow:0 0 20px rgba(255,204,0,0.6);
}

canvas{
width:100%;
max-width:600px;
height:150px;
margin-top:30px;
}

.timeline{
position:relative;
max-width:700px;
margin:auto;
}

.timeline::before{
content:'';
position:absolute;
left:50%;
top:0;
bottom:0;
width:3px;
background:#ffcc00;
}

.timeline-item{
display:flex;
justify-content:space-between;
margin:40px 0;
}

.timeline-time{
background:#ff512f;
padding:10px 18px;
border-radius:20px;
font-weight:bold;
}

.timeline-content{
background:rgba(255,255,255,0.05);
padding:20px;
border-radius:15px;
width:45%;
}

</style>
</head>

<body>

<nav>
<a href="index.html">Home</a>
<a href="gallery.html">Gallery</a>
<a href="register.html">Register</a>
<a href="contact.html">Contact</a>
</nav>

<div class="hero">

<button onclick="startMusic()" class="btn">🎶 Click to Feel the Vibe</button>

<audio id="bgmusic" src="music.mp3" loop></audio>

<h1>GAANA BAJAANA 🎶</h1>
<p>Sing • Jam • Vibe</p>

<canvas id="visualizer"></canvas>

</div>

<div class="section">
<h2>Event Timeline 🎶</h2>

<div class="timeline">

<div class="timeline-item">
<div class="timeline-time">6:00 PM</div>
<div class="timeline-content">
<h3>Welcome & Registration Confirmation</h3>
</div>
</div>

<div class="timeline-item">
<div class="timeline-time">6:15 PM</div>
<div class="timeline-content">
<h3>Music Jam Begins</h3>
</div>
</div>

<div class="timeline-item">
<div class="timeline-time">8:30 PM</div>
<div class="timeline-content">
<h3>Networking & Closing</h3>
</div>
</div>

</div>
</div>

<script>

let audioCtx, analyser, source, dataArray, canvas, ctx;

function startMusic(){

let audio = document.getElementById("bgmusic");
audio.play();

audioCtx = new (window.AudioContext || window.webkitAudioContext)();
source = audioCtx.createMediaElementSource(audio);
analyser = audioCtx.createAnalyser();
source.connect(analyser);
analyser.connect(audioCtx.destination);

analyser.fftSize = 64;
dataArray = new Uint8Array(analyser.frequencyBinCount);

canvas = document.getElementById("visualizer");
ctx = canvas.getContext("2d");

animate();
}

function animate(){
requestAnimationFrame(animate);

analyser.getByteFrequencyData(dataArray);

ctx.fillStyle="#0f0f0f";
ctx.fillRect(0,0,canvas.width,canvas.height);

let barWidth = canvas.width / dataArray.length;

for(let i=0;i<dataArray.length;i++){
let barHeight = dataArray[i];

ctx.fillStyle = "#ffcc00";
ctx.fillRect(i*barWidth, canvas.height-barHeight, barWidth-2, barHeight);
}
}

</script>

</body>
</html>
