<!DOCTYPE html>
<html>
<head>
<title>Gaana Bajaana</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
margin:0;
font-family: 'Segoe UI', sans-serif;
background:#07070a;
color:white;
overflow-x:hidden;
}

/* animated gradient aura */
body::before{
content:"";
position:fixed;
width:200%;
height:200%;
background: radial-gradient(circle at center,#ffcc00 0%,transparent 40%);
animation: pulse 8s infinite alternate;
opacity:0.08;
z-index:-1;
}

@keyframes pulse{
from{transform:scale(1);}
to{transform:scale(1.4);}
}

/* floating particles */
canvas#bg{
position:fixed;
top:0;
left:0;
z-index:-2;
}

/* hero */
.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

h1{
font-size:70px;
letter-spacing:4px;
text-shadow:0 0 20px #ffcc00;
margin:0;
}

.tag{
opacity:0.7;
margin-top:10px;
}

.btn{
margin-top:40px;
background:linear-gradient(45deg,#ffcc00,#ff512f);
padding:15px 35px;
border-radius:40px;
border:none;
font-weight:bold;
cursor:pointer;
font-size:18px;
box-shadow:0 0 25px rgba(255,204,0,0.6);
}

/* waveform visualizer */
#wave{
width:80%;
max-width:600px;
height:120px;
margin-top:50px;
}

/* glass section */
.section{
backdrop-filter: blur(20px);
background: rgba(255,255,255,0.03);
margin:60px auto;
padding:40px;
border-radius:20px;
max-width:900px;
}

h2{
text-shadow:0 0 12px #ffcc00;
}

/* instagram strip */
.insta{
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
}

iframe{
border-radius:15px;
}

/* stats */
.stats{
display:flex;
gap:40px;
justify-content:center;
flex-wrap:wrap;
}

.stat{
text-align:center;
}

.stat h1{
color:#ffcc00;
font-size:50px;
}

</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="hero">
<h1>GAANA BAJAANA</h1>
<div class="tag">Sing • Jam • Vibe</div>

<button class="btn" onclick="startExperience()">🎧 Enter the Vibe</button>

<canvas id="wave"></canvas>
</div>

<div class="section">
<h2>Event Vibes 🎥</h2>
<div class="insta">
<iframe src="https://www.instagram.com/reel/DVtiyu7D1uP/embed" width="320" height="550"></iframe>
<iframe src="https://www.instagram.com/reel/DVwCqbaD5OS/embed" width="320" height="550"></iframe>
</div>
</div>

<div class="section">
<h2>Impact ✨</h2>
<div class="stats">
<div class="stat"><h1>60+</h1><p>Attendees</p></div>
<div class="stat"><h1>20+</h1><p>Songs</p></div>
<div class="stat"><h1>1</h1><p>Band</p></div>
<div class="stat"><h1>5+</h1><p>Collabs</p></div>
</div>
</div>

<script>

/* particles background */
const canvasBg = document.getElementById("bg");
const ctxBg = canvasBg.getContext("2d");
canvasBg.width = window.innerWidth;
canvasBg.height = window.innerHeight;

let particles = [];
for(let i=0;i<60;i++){
particles.push({
x:Math.random()*canvasBg.width,
y:Math.random()*canvasBg.height,
r:Math.random()*2,
v:Math.random()*0.5
});
}

function animateBg(){
ctxBg.clearRect(0,0,canvasBg.width,canvasBg.height);
particles.forEach(p=>{
p.y -= p.v;
if(p.y<0)p.y=canvasBg.height;
ctxBg.fillStyle="#ffcc00";
ctxBg.beginPath();
ctxBg.arc(p.x,p.y,p.r,0,Math.PI*2);
ctxBg.fill();
});
requestAnimationFrame(animateBg);
}
animateBg();

/* waveform visualizer */
let audio,ctx,analyser,data,waveCtx;

function startExperience(){

audio = new Audio("music.mp3");
audio.loop=true;
audio.play();

ctx = new (window.AudioContext || window.webkitAudioContext)();
analyser = ctx.createAnalyser();
let source = ctx.createMediaElementSource(audio);

source.connect(analyser);
analyser.connect(ctx.destination);

data = new Uint8Array(analyser.frequencyBinCount);

waveCtx = document.getElementById("wave").getContext("2d");

drawWave();
}

function drawWave(){
requestAnimationFrame(drawWave);
analyser.getByteTimeDomainData(data);

waveCtx.clearRect(0,0,600,120);
waveCtx.beginPath();

let slice = 600/data.length;
let x = 0;

for(let i=0;i<data.length;i++){
let v = data[i]/128.0;
let y = v*60;

i===0 ? waveCtx.moveTo(x,y) : waveCtx.lineTo(x,y);
x+=slice;
}

waveCtx.strokeStyle="#ffcc00";
waveCtx.lineWidth=2;
waveCtx.stroke();
}

</script>

</body>
</html>
