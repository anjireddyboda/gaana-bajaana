<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Gaana Bajaana — Robo Check-In</title>
<style>
:root{
  --gold:#F5C842;--coral:#FF5733;--green:#25D366;
  --dark:#070709;--dark2:#0E0E12;--dark3:#13131A;
  --border:rgba(255,255,255,0.07);
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;background:var(--dark);color:#fff;font-family:-apple-system,Arial,sans-serif;overflow:hidden;}

/* ── SCREENS ── */
.screen{display:none;position:fixed;inset:0;flex-direction:column;align-items:center;justify-content:center;padding:24px;z-index:10;}
.screen.active{display:flex;}

/* ── PIN SCREEN ── */
#pin-screen{background:var(--dark);}
.brand-top{text-align:center;margin-bottom:32px;}
.brand-top h1{font-size:28px;font-weight:900;letter-spacing:6px;background:linear-gradient(135deg,var(--gold),var(--coral));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.brand-top p{font-size:11px;letter-spacing:3px;color:rgba(255,255,255,0.4);margin-top:6px;text-transform:uppercase;}
.pin-box{background:var(--dark2);border:1px solid var(--border);border-radius:20px;padding:32px 28px;width:min(380px,100%);text-align:center;}
.pin-box h2{font-size:14px;letter-spacing:3px;color:rgba(255,255,255,0.4);text-transform:uppercase;margin-bottom:6px;}
.lock{font-size:48px;margin-bottom:16px;line-height:1;}
.pin-input{width:100%;background:var(--dark3);border:1px solid var(--border);border-radius:12px;padding:18px;color:#fff;font-size:28px;text-align:center;letter-spacing:12px;outline:none;font-family:monospace;-moz-appearance:textfield;margin-bottom:14px;transition:border-color 0.3s;}
.pin-input::-webkit-outer-spin-button,.pin-input::-webkit-inner-spin-button{-webkit-appearance:none;}
.pin-input:focus{border-color:rgba(245,200,66,0.5);}
.pin-btn{width:100%;background:linear-gradient(135deg,var(--gold),var(--coral));border:none;border-radius:12px;padding:15px;font-size:15px;font-weight:bold;color:#000;letter-spacing:2px;cursor:pointer;text-transform:uppercase;}
.pin-btn:active{opacity:0.85;}
.pin-error{font-size:12px;color:var(--coral);margin-top:10px;display:none;letter-spacing:1px;}

/* ── SCANNER SCREEN ── */
#scanner-screen{background:#000;padding:0;}
.scanner-header{position:fixed;top:0;left:0;right:0;z-index:20;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;background:linear-gradient(to bottom,rgba(0,0,0,0.9),transparent);}
.scanner-logo{font-size:16px;font-weight:900;letter-spacing:4px;background:linear-gradient(135deg,var(--gold),var(--coral));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.status-dot{width:10px;height:10px;background:var(--green);border-radius:50%;animation:pulse 1.5s ease-in-out infinite;display:inline-block;margin-right:6px;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.5;transform:scale(1.4);}}
.status-txt{font-size:11px;letter-spacing:2px;color:rgba(255,255,255,0.6);text-transform:uppercase;}
.exit-btn{font-size:11px;color:rgba(255,255,255,0.3);cursor:pointer;letter-spacing:1px;background:none;border:none;padding:4px 8px;}

/* VIDEO */
#video-container{position:fixed;inset:0;}
#video{width:100%;height:100%;object-fit:cover;display:block;}
#canvas{display:none;}

/* SCAN FRAME OVERLAY */
.scan-overlay{position:fixed;inset:0;z-index:15;pointer-events:none;}
.scan-overlay::before{
  content:'';position:absolute;inset:0;
  background:rgba(0,0,0,0.55);
  -webkit-mask:
    linear-gradient(#000,#000) top/100% calc(50% - 130px),
    linear-gradient(#000,#000) bottom/100% calc(50% - 130px),
    linear-gradient(#000,#000) left/calc(50% - 130px) 100%,
    linear-gradient(#000,#000) right/calc(50% - 130px) 100%;
  -webkit-mask-composite:destination-out;
  mask-composite:exclude;
  mask:
    linear-gradient(#000,#000) top/100% calc(50% - 130px),
    linear-gradient(#000,#000) bottom/100% calc(50% - 130px),
    linear-gradient(#000,#000) left/calc(50% - 130px) 100%,
    linear-gradient(#000,#000) right/calc(50% - 130px) 100%;
}
.scan-box{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:260px;height:260px;}
.scan-box::before,.scan-box::after{content:'';position:absolute;width:36px;height:36px;border-color:var(--gold);border-style:solid;}
.scan-box::before{top:0;left:0;border-width:3px 0 0 3px;border-radius:4px 0 0 0;}
.scan-box::after{bottom:0;right:0;border-width:0 3px 3px 0;border-radius:0 0 4px 0;}
.scan-box-br::before,.scan-box-br::after{content:'';position:absolute;width:36px;height:36px;border-color:var(--gold);border-style:solid;}
.scan-box-br::before{top:0;right:0;border-width:3px 3px 0 0;border-radius:0 4px 0 0;}
.scan-box-br::after{bottom:0;left:0;border-width:0 0 3px 3px;border-radius:0 0 0 4px;}
.scan-line{position:absolute;left:4px;right:4px;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);top:0;animation:scan-move 2s ease-in-out infinite;box-shadow:0 0 8px var(--gold);}
@keyframes scan-move{0%,100%{top:4px;opacity:1;}50%{top:252px;opacity:0.7;}}
.scan-hint{position:absolute;bottom:-42px;left:50%;transform:translateX(-50%);font-size:12px;letter-spacing:2px;color:rgba(255,255,255,0.5);white-space:nowrap;text-transform:uppercase;}

/* BOTTOM BAR */
.bottom-bar{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.75);border:1px solid var(--border);border-radius:40px;padding:10px 22px;font-size:12px;letter-spacing:2px;color:rgba(255,255,255,0.4);text-transform:uppercase;z-index:20;display:flex;align-items:center;gap:14px;}
.bottom-bar strong{font-family:monospace;color:var(--gold);font-size:20px;}

/* CONTROLS */
.ctrl-btn{position:fixed;z-index:25;width:40px;height:40px;border-radius:50%;background:rgba(0,0,0,0.65);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.3s;}
.ctrl-btn:hover{border-color:rgba(245,200,66,0.4);}
#torch-btn{top:62px;right:64px;font-size:18px;}
#torch-btn.on{background:rgba(245,200,66,0.2);border-color:rgba(245,200,66,0.5);}
#vol-btn{top:62px;right:16px;}
#vol-btn svg{width:18px;height:18px;}

/* ── RESULT OVERLAY ── */
#result-overlay{position:fixed;inset:0;z-index:50;display:none;align-items:center;justify-content:center;padding:24px;background:rgba(0,0,0,0.92);backdrop-filter:blur(12px);}
#result-overlay.show{display:flex;}
.result-card{max-width:340px;width:100%;border-radius:24px;overflow:hidden;box-shadow:0 24px 64px rgba(0,0,0,0.7);animation:slideUp 0.4s cubic-bezier(0.34,1.56,0.64,1);}
@keyframes slideUp{from{opacity:0;transform:translateY(60px) scale(0.9);}to{opacity:1;transform:translateY(0) scale(1);}}
.rc-top{padding:16px 24px;text-align:center;}
.rc-body{padding:28px 22px 24px;background:var(--dark2);text-align:center;}
.rc-icon{font-size:64px;line-height:1;margin-bottom:10px;}
.rc-status{font-size:17px;font-weight:900;letter-spacing:4px;text-transform:uppercase;margin-bottom:14px;}
.rc-name{font-size:24px;font-weight:700;color:#fff;margin-bottom:8px;}
.rc-id{display:inline-block;background:rgba(245,200,66,0.1);border:1px solid rgba(245,200,66,0.25);border-radius:20px;padding:4px 14px;font-family:monospace;font-size:12px;color:var(--gold);letter-spacing:3px;margin-bottom:12px;}
.rc-time{font-size:11px;color:rgba(255,255,255,0.35);letter-spacing:1px;margin-bottom:14px;}
.rc-msg{font-size:12px;color:rgba(255,255,255,0.4);line-height:1.6;}

/* wave bars for success */
.rc-wave{display:flex;align-items:flex-end;gap:4px;justify-content:center;height:28px;margin-bottom:12px;}
.rc-wave span{width:5px;border-radius:3px;background:var(--green);}
.rc-wave.active span:nth-child(1){animation:wv 0.6s ease-in-out infinite;}
.rc-wave.active span:nth-child(2){animation:wv 0.8s ease-in-out infinite 0.1s;}
.rc-wave.active span:nth-child(3){animation:wv 0.7s ease-in-out infinite 0.2s;}
.rc-wave.active span:nth-child(4){animation:wv 0.9s ease-in-out infinite 0.05s;}
.rc-wave.active span:nth-child(5){animation:wv 0.65s ease-in-out infinite 0.15s;}
@keyframes wv{0%,100%{height:4px;}50%{height:24px;}}

/* card themes */
.rc-success .rc-top{background:linear-gradient(135deg,#0d2018,#1a3a28);}
.rc-success .rc-status{color:var(--green);}
.rc-already .rc-top{background:linear-gradient(135deg,#201c08,#3a3010);}
.rc-already .rc-status{color:var(--gold);}
.rc-error .rc-top{background:linear-gradient(135deg,#200808,#3a1010);}
.rc-error .rc-status{color:var(--coral);}
.rc-loading .rc-top{background:var(--dark3);}
.rc-loading .rc-status{color:rgba(255,255,255,0.5);}

/* SPEAKING BAR */
#speaking-bar{position:fixed;bottom:74px;left:50%;transform:translateX(-50%);background:rgba(37,211,102,0.12);border:1px solid rgba(37,211,102,0.25);border-radius:30px;padding:7px 16px;font-size:11px;letter-spacing:2px;color:var(--green);text-transform:uppercase;display:none;align-items:center;gap:8px;z-index:60;white-space:nowrap;}
#speaking-bar.show{display:flex;}

@media(max-width:380px){.scan-box{width:220px;height:220px;}.rc-name{font-size:20px;}}
</style>
</head>
<body>

<!-- ══ PIN SCREEN ══════════════════════════════════════ -->
<div class="screen active" id="pin-screen">
  <div class="brand-top">
    <h1>GAANA BAJAANA</h1>
    <p>🤖 Robo Check-In System</p>
  </div>
  <div class="pin-box">
    <div class="lock">🔐</div>
    <h2>Organizer PIN</h2>
    <input class="pin-input" type="number" id="pin-input" placeholder="· · · ·" maxlength="4" inputmode="numeric" autocomplete="off">
    <button class="pin-btn" onclick="startScanner()">Start Check-In →</button>
    <div class="pin-error" id="pin-error">Please enter the organizer PIN.</div>
  </div>
</div>

<!-- ══ SCANNER SCREEN ══════════════════════════════════ -->
<div class="screen" id="scanner-screen">
  <div id="video-container">
    <video id="video" playsinline autoplay muted></video>
    <canvas id="canvas"></canvas>
  </div>

  <div class="scan-overlay">
    <div class="scan-box">
      <div class="scan-box-br"></div>
      <div class="scan-line"></div>
      <div class="scan-hint">Point at QR code</div>
    </div>
  </div>

  <div class="scanner-header">
    <div class="scanner-logo">GAANA BAJAANA</div>
    <div style="display:flex;align-items:center;gap:16px;">
      <div><span class="status-dot"></span><span class="status-txt" id="scan-status">Scanning</span></div>
      <button class="exit-btn" onclick="stopScanner()">✕ Exit</button>
    </div>
  </div>

  <button class="ctrl-btn" id="torch-btn" onclick="toggleTorch()" title="Flashlight">🔦</button>
  <button class="ctrl-btn" id="vol-btn" onclick="toggleVoice()" title="Toggle voice">
    <svg id="icon-sound" viewBox="0 0 24 24" fill="rgba(255,255,255,0.6)"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
    <svg id="icon-mute" viewBox="0 0 24 24" fill="var(--coral)" style="display:none"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>
  </button>

  <div class="bottom-bar">
    <span>Checked In Today</span>
    <strong id="checkin-count">0</strong>
  </div>
</div>

<!-- ══ RESULT OVERLAY ══════════════════════════════════ -->
<div id="result-overlay">
  <div class="result-card" id="result-card">
    <div class="rc-top" id="rc-top">
      <div class="rc-icon" id="rc-icon">🎵</div>
      <div class="rc-wave" id="rc-wave"><span></span><span></span><span></span><span></span><span></span></div>
    </div>
    <div class="rc-body">
      <div class="rc-status" id="rc-status">WELCOME!</div>
      <div class="rc-name"   id="rc-name">Loading...</div>
      <div class="rc-id"     id="rc-id">GB2-000</div>
      <div class="rc-time"   id="rc-time"></div>
      <div class="rc-msg"    id="rc-msg"></div>
    </div>
  </div>
</div>

<!-- SPEAKING INDICATOR -->
<div id="speaking-bar">🎤 Robo speaking...</div>

<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
<script>
/* ═══════════════════════════════════════════════════
   CONFIG — your exact Apps Script URL
═══════════════════════════════════════════════════ */
const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbyZJMnn98BL3pYQZZqPVDcNpOqxMUklKlmqVE-kr6dURiLsyYn2zz1YuAvfjpIYMZs_/exec';
const FIREBASE_ID = 'gaana-bajaana-9210f';
const EVENT_NAME  = 'Gaana Bajaana Edition 2';
const ORG_PIN     = '55'; // organizer PIN — checked locally, no server call needed

/* ═══════════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════════ */
let videoStream    = null;
let scanActive     = false;
let animFrame      = null;
let lastScannedQR  = '';
let lastScanTime   = 0;
let voiceEnabled   = true;
let torchOn        = false;
let torchTrack     = null;
let checkinCount   = 0;
let resultTimer    = null;
let synth          = window.speechSynthesis;
let voices         = [];
let isProcessing   = false;

/* ═══════════════════════════════════════════════════
   PIN SCREEN
═══════════════════════════════════════════════════ */
document.getElementById('pin-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') startScanner();
});

async function startScanner() {
  const pin = document.getElementById('pin-input').value.trim();
  if (!pin) {
    showPinError('Please enter the organizer PIN.');
    return;
  }
  if (pin !== ORG_PIN) {
    showPinError('Wrong PIN. Please try again.');
    return;
  }

  document.getElementById('pin-error').style.display = 'none';
  loadVoices();

  try {
    videoStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }
    });
    const video = document.getElementById('video');
    video.srcObject = videoStream;
    await video.play();

    const tracks = videoStream.getVideoTracks();
    if (tracks.length) torchTrack = tracks[0];

    showScreen('scanner-screen');
    loadFirebaseCount();

    video.addEventListener('loadedmetadata', () => {
      scanActive = true;
      requestAnimationFrame(scanLoop);
    }, { once: true });
  } catch(err) {
    showPinError('Camera denied. Allow camera access and try again.');
    console.error(err);
  }
}

function showPinError(msg) {
  const el = document.getElementById('pin-error');
  el.textContent = msg;
  el.style.display = 'block';
}

function stopScanner() {
  scanActive = false;
  if (animFrame) cancelAnimationFrame(animFrame);
  if (videoStream) { videoStream.getTracks().forEach(t => t.stop()); videoStream = null; }
  hideResult();
  showScreen('pin-screen');
  setStatus('Scanning');
}

/* ═══════════════════════════════════════════════════
   QR SCAN LOOP
═══════════════════════════════════════════════════ */
function scanLoop() {
  if (!scanActive) return;

  const video  = document.getElementById('video');
  const canvas = document.getElementById('canvas');
  const ctx    = canvas.getContext('2d');

  if (video.readyState === video.HAVE_ENOUGH_DATA) {
    canvas.width  = video.videoWidth;
    canvas.height = video.videoHeight;
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

    try {
      const img  = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const code = jsQR(img.data, img.width, img.height, { inversionAttempts: 'dontInvert' });

      if (code) {
        const now = Date.now();
        // Debounce: don't re-process same QR within 8 seconds
        if (code.data !== lastScannedQR || now - lastScanTime > 8000) {
          if (!isProcessing) {
            lastScannedQR = code.data;
            lastScanTime  = now;
            handleQR(code.data);
          }
        }
      }
    } catch(e) { /* jsQR error — continue */ }
  }

  animFrame = requestAnimationFrame(scanLoop);
}

/* ═══════════════════════════════════════════════════
   HANDLE QR — extract RegID, call Apps Script JSON API
═══════════════════════════════════════════════════ */
async function handleQR(qrText) {
  // Extract RegID from QR
  let regId = '';
  try {
    const url = new URL(qrText);
    regId = url.searchParams.get('id') || '';
  } catch(e) {
    // Maybe plain reg ID was encoded directly
    if (/^GB\d/i.test(qrText.trim())) regId = qrText.trim();
  }

  if (!regId) {
    showResult({ status: 'invalid' });
    speak('Invalid QR code.');
    return;
  }

  isProcessing = true;
  setStatus('Verifying...');
  showLoadingCard(regId);

  try {
    // ── KEY FIX: use format=json so Apps Script returns JSON (no CORS issue) ──
    const apiUrl = WEB_APP_URL + '?id=' + encodeURIComponent(regId) + '&format=json';
    const resp   = await fetch(apiUrl);

    if (!resp.ok) throw new Error('HTTP ' + resp.status);

    const data = await resp.json();
    handleResult(data, regId);

  } catch(err) {
    console.error('Check-in fetch error:', err);
    // Even on error, show what we know — the sheet was likely updated
    showResult({ status: 'network_error', regId });
    speak('Connection issue. Please check the sheet manually.');
    setStatus('Error');
    setTimeout(() => setStatus('Scanning'), 4000);
  }

  isProcessing = false;
}

/* ═══════════════════════════════════════════════════
   HANDLE RESULT FROM APPS SCRIPT JSON
═══════════════════════════════════════════════════ */
function handleResult(data, regId) {
  const now     = new Date();
  const timeStr = now.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit', hour12: true });

  switch (data.status) {

    case 'success':
      checkinCount++;
      updateCheckinDisplay();
      showResult({
        cardClass : 'rc-success',
        icon      : '🎵',
        status    : 'WELCOME!',
        name      : data.name || 'Guest',
        id        : regId,
        time      : '✅ Checked in at ' + (data.time || timeStr),
        msg       : 'Entry confirmed. Enjoy the music tonight! 🎶',
        wave      : true,
        autoClose : 6000
      });
      speak(buildWelcome(data.name));
      setStatus('✓ Checked In');
      setTimeout(() => setStatus('Scanning'), 6000);
      break;

    case 'already_checked':
      showResult({
        cardClass : 'rc-already',
        icon      : '⚠️',
        status    : 'ALREADY IN',
        name      : data.name || regId,
        id        : regId,
        time      : 'QR pass already used',
        msg       : 'This person already entered. Contact team if needed.',
        wave      : false,
        autoClose : 4000
      });
      speak((data.name ? data.name + ' has' : 'This person has') + ' already checked in.');
      setStatus('Already In');
      setTimeout(() => setStatus('Scanning'), 4000);
      break;

    case 'not_found':
      showResult({
        cardClass : 'rc-error',
        icon      : '❓',
        status    : 'NOT FOUND',
        name      : 'Registration Not Found',
        id        : regId,
        time      : '',
        msg       : 'This QR is not in the system. Contact team.',
        wave      : false,
        autoClose : 4000
      });
      speak('Registration not found. Please contact the event team.');
      setStatus('Not Found');
      setTimeout(() => setStatus('Scanning'), 4000);
      break;

    case 'invalid':
      showResult({
        cardClass : 'rc-error',
        icon      : '❌',
        status    : 'INVALID QR',
        name      : 'Not a GB Pass',
        id        : '',
        time      : '',
        msg       : 'This is not a valid Gaana Bajaana QR code.',
        wave      : false,
        autoClose : 3000
      });
      speak('Invalid QR code.');
      setTimeout(() => setStatus('Scanning'), 3000);
      break;

    default:
      showResult({
        cardClass : 'rc-error',
        icon      : '⚠️',
        status    : 'ERROR',
        name      : 'Something Went Wrong',
        id        : regId,
        time      : '',
        msg       : 'Please try again or contact team.',
        wave      : false,
        autoClose : 4000
      });
      speak('An error occurred. Please try again.');
      setStatus('Error');
      setTimeout(() => setStatus('Scanning'), 4000);
  }
}

/* ═══════════════════════════════════════════════════
   RESULT CARD UI
═══════════════════════════════════════════════════ */
function showLoadingCard(regId) {
  showResult({
    cardClass : 'rc-loading',
    icon      : '⏳',
    status    : 'VERIFYING...',
    name      : 'Please wait',
    id        : regId,
    time      : 'Checking registration system',
    msg       : '',
    wave      : false,
    autoClose : 0
  });
}

function showResult(opts) {
  if (typeof opts === 'object' && opts.status === 'invalid') {
    opts = { cardClass:'rc-error', icon:'❌', status:'INVALID QR', name:'Not a GB Pass',
             id:'', time:'', msg:'Not a valid Gaana Bajaana QR code.', wave:false, autoClose:3000 };
  }
  if (opts.status === 'network_error') {
    opts = { cardClass:'rc-error', icon:'📶', status:'NETWORK ERROR', name:'Check Sheet Manually',
             id: opts.regId||'', time:'', msg:'Attendance may have been marked. Check Google Sheets.', wave:false, autoClose:5000 };
  }

  const card = document.getElementById('result-card');
  card.className = 'result-card ' + (opts.cardClass || '');
  document.getElementById('rc-icon').textContent   = opts.icon || '';
  document.getElementById('rc-status').textContent = opts.status || '';
  document.getElementById('rc-name').textContent   = opts.name || '';
  document.getElementById('rc-id').textContent     = opts.id || '';
  document.getElementById('rc-id').style.display   = opts.id ? 'inline-block' : 'none';
  document.getElementById('rc-time').textContent   = opts.time || '';
  document.getElementById('rc-msg').textContent    = opts.msg || '';
  document.getElementById('rc-wave').className     = 'rc-wave' + (opts.wave ? ' active' : '');

  document.getElementById('result-overlay').classList.add('show');

  clearTimeout(resultTimer);
  if (opts.autoClose) {
    resultTimer = setTimeout(hideResult, opts.autoClose);
  }
}

function hideResult() {
  document.getElementById('result-overlay').classList.remove('show');
  clearTimeout(resultTimer);
}

document.getElementById('result-overlay').addEventListener('click', () => {
  clearTimeout(resultTimer);
  hideResult();
});

/* ═══════════════════════════════════════════════════
   VOICE / SPEECH
═══════════════════════════════════════════════════ */
function loadVoices() {
  voices = synth.getVoices();
  if (!voices.length) synth.addEventListener('voiceschanged', () => { voices = synth.getVoices(); });
}

function getVoice() {
  return voices.find(v => v.lang === 'en-IN')
      || voices.find(v => v.lang.startsWith('en-'))
      || voices[0]
      || null;
}

function speak(text) {
  if (!voiceEnabled || !synth) return;
  synth.cancel();
  const utt   = new SpeechSynthesisUtterance(text);
  utt.lang    = 'en-IN';
  utt.rate    = 0.92;
  utt.pitch   = 1.05;
  utt.volume  = 1;
  const v     = getVoice();
  if (v) utt.voice = v;
  utt.onstart = () => document.getElementById('speaking-bar').classList.add('show');
  utt.onend   = () => document.getElementById('speaking-bar').classList.remove('show');
  utt.onerror = () => document.getElementById('speaking-bar').classList.remove('show');
  synth.speak(utt);
}

function buildWelcome(name) {
  const msgs = name ? [
    `Welcome to ${EVENT_NAME}, ${name}! Your entry is confirmed. Enjoy the music!`,
    `${name}, you're in! Welcome to ${EVENT_NAME}. Get ready to sing and vibe!`,
    `Woohoo! Welcome ${name}! Entry confirmed. Have an amazing time at ${EVENT_NAME}!`,
    `${name}, welcome! Your pass is verified. Enjoy the jam tonight!`,
    `Hello ${name}! Entry confirmed. Welcome to ${EVENT_NAME}!`
  ] : [
    `Entry confirmed! Welcome to ${EVENT_NAME}!`,
    `Welcome! Enjoy the music tonight!`
  ];
  return msgs[Math.floor(Math.random() * msgs.length)];
}

function toggleVoice() {
  voiceEnabled = !voiceEnabled;
  document.getElementById('icon-sound').style.display = voiceEnabled ? 'block' : 'none';
  document.getElementById('icon-mute').style.display  = voiceEnabled ? 'none'  : 'block';
  if (!voiceEnabled) synth.cancel();
}

/* ═══════════════════════════════════════════════════
   TORCH
═══════════════════════════════════════════════════ */
async function toggleTorch() {
  if (!torchTrack) return;
  try {
    torchOn = !torchOn;
    await torchTrack.applyConstraints({ advanced: [{ torch: torchOn }] });
    document.getElementById('torch-btn').classList.toggle('on', torchOn);
  } catch(e) {
    torchOn = false;
    console.log('Torch not supported');
  }
}

/* ═══════════════════════════════════════════════════
   FIREBASE — load live check-in count
═══════════════════════════════════════════════════ */
async function loadFirebaseCount() {
  try {
    const url  = `https://firestore.googleapis.com/v1/projects/${FIREBASE_ID}/databases/(default)/documents/config/event`;
    const resp = await fetch(url);
    const data = await resp.json();
    if (data.fields && data.fields.checkInCount) {
      checkinCount = parseInt(data.fields.checkInCount.integerValue || '0');
      updateCheckinDisplay();
    }
  } catch(e) { /* use local count */ }
}

function updateCheckinDisplay() {
  document.getElementById('checkin-count').textContent = checkinCount;
}

/* ═══════════════════════════════════════════════════
   UTILS
═══════════════════════════════════════════════════ */
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function setStatus(txt) {
  document.getElementById('scan-status').textContent = txt;
}

/* Screen wake lock */
async function keepAwake() {
  try {
    if ('wakeLock' in navigator) {
      await navigator.wakeLock.request('screen');
    }
  } catch(e) {}
}
keepAwake();
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') keepAwake();
});

/* Load voices on page load */
window.addEventListener('load', () => { if (synth) loadVoices(); });
</script>
