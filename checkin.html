<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Gaana Bajaana — Robo Check-In</title>
<style>
:root{
  --gold:#F5C842;--coral:#FF5733;--green:#25D366;
  --dark:#070709;--dark2:#0E0E12;--dark3:#13131A;
  --border:rgba(255,255,255,0.08);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--dark);color:#fff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;overflow:hidden;}

/* ── SCREENS ── */
.screen{display:none;position:fixed;inset:0;flex-direction:column;align-items:center;justify-content:center;padding:20px;}
.screen.active{display:flex;}

/* ── PIN SCREEN ── */
#pin-screen{background:radial-gradient(ellipse at top,#1a1208 0%,var(--dark) 70%);}
.brand{text-align:center;margin-bottom:28px;}
.brand h1{font-size:26px;font-weight:900;letter-spacing:6px;background:linear-gradient(135deg,var(--gold),var(--coral));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:4px;}
.brand p{font-size:10px;letter-spacing:3px;color:rgba(255,255,255,0.35);text-transform:uppercase;}
.pin-card{background:var(--dark2);border:1px solid var(--border);border-radius:20px;padding:28px 24px;width:min(360px,100%);text-align:center;}
.pin-card .lock{font-size:44px;margin-bottom:14px;line-height:1;}
.pin-card h2{font-size:11px;letter-spacing:3px;color:rgba(255,255,255,0.35);text-transform:uppercase;margin-bottom:16px;}
.pin-input{width:100%;background:var(--dark3);border:2px solid var(--border);border-radius:12px;padding:16px;color:#fff;font-size:30px;text-align:center;letter-spacing:14px;outline:none;font-family:monospace;-moz-appearance:textfield;margin-bottom:12px;transition:border-color .3s;}
.pin-input::-webkit-outer-spin-button,.pin-input::-webkit-inner-spin-button{-webkit-appearance:none;}
.pin-input:focus{border-color:rgba(245,200,66,.5);}
.pin-btn{width:100%;background:linear-gradient(135deg,var(--gold),var(--coral));border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:700;color:#000;letter-spacing:2px;cursor:pointer;text-transform:uppercase;transition:opacity .2s;}
.pin-btn:active{opacity:.8;}
.pin-msg{font-size:11px;margin-top:10px;display:none;letter-spacing:1px;}
.pin-msg.err{color:var(--coral);}
.pin-msg.ok{color:var(--green);}

/* ── SCANNER SCREEN ── */
#scanner-screen{background:#000;padding:0;}
#video{position:fixed;inset:0;width:100%;height:100%;object-fit:cover;display:block;}
#canvas{display:none;}

/* SCAN FRAME */
.scan-frame{position:fixed;inset:0;z-index:10;pointer-events:none;}
.scan-frame::before{
  content:'';position:absolute;inset:0;
  background:rgba(0,0,0,.5);
  -webkit-mask:
    linear-gradient(#000,#000) top/100% calc(50% - 125px),
    linear-gradient(#000,#000) bottom/100% calc(50% - 125px),
    linear-gradient(#000,#000) left/calc(50% - 125px) 100%,
    linear-gradient(#000,#000) right/calc(50% - 125px) 100%;
  -webkit-mask-composite:destination-out;
  mask-composite:exclude;
  mask:
    linear-gradient(#000,#000) top/100% calc(50% - 125px),
    linear-gradient(#000,#000) bottom/100% calc(50% - 125px),
    linear-gradient(#000,#000) left/calc(50% - 125px) 100%,
    linear-gradient(#000,#000) right/calc(50% - 125px) 100%;
}
.scan-box{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:250px;height:250px;}
.corner{position:absolute;width:32px;height:32px;border:3px solid var(--gold);}
.corner.tl{top:0;left:0;border-right:none;border-bottom:none;border-radius:3px 0 0 0;}
.corner.tr{top:0;right:0;border-left:none;border-bottom:none;border-radius:0 3px 0 0;}
.corner.bl{bottom:0;left:0;border-right:none;border-top:none;border-radius:0 0 0 3px;}
.corner.br{bottom:0;right:0;border-left:none;border-top:none;border-radius:0 0 3px 0;}
.scan-line{position:absolute;left:4px;right:4px;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);box-shadow:0 0 8px var(--gold);animation:scanline 2s ease-in-out infinite;}
@keyframes scanline{0%,100%{top:4px;}50%{top:244px;}}
.scan-label{position:absolute;bottom:-36px;left:50%;transform:translateX(-50%);font-size:11px;letter-spacing:2px;color:rgba(255,255,255,.45);white-space:nowrap;text-transform:uppercase;}

/* HEADER */
.scan-header{position:fixed;top:0;left:0;right:0;z-index:20;display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:linear-gradient(to bottom,rgba(0,0,0,.85),transparent);}
.scan-logo{font-size:14px;font-weight:900;letter-spacing:4px;background:linear-gradient(135deg,var(--gold),var(--coral));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.scan-status{display:flex;align-items:center;gap:8px;}
.sdot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:sdotpulse 1.5s infinite;}
@keyframes sdotpulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.4;transform:scale(1.5);}}
.stxt{font-size:10px;letter-spacing:2px;color:rgba(255,255,255,.55);text-transform:uppercase;}
.exit-btn{font-size:11px;color:rgba(255,255,255,.3);background:none;border:1px solid var(--border);border-radius:6px;padding:5px 10px;cursor:pointer;letter-spacing:1px;}

/* FOOTER BAR */
.scan-footer{position:fixed;bottom:0;left:0;right:0;z-index:20;display:flex;align-items:center;justify-content:space-between;padding:12px 20px;background:linear-gradient(to top,rgba(0,0,0,.85),transparent);}
.count-box{display:flex;align-items:center;gap:8px;}
.count-lbl{font-size:10px;letter-spacing:2px;color:rgba(255,255,255,.35);text-transform:uppercase;}
.count-num{font-size:28px;font-weight:900;color:var(--gold);font-family:monospace;line-height:1;}
.btn-group{display:flex;gap:8px;}
.icon-btn{width:38px;height:38px;border-radius:50%;background:rgba(0,0,0,.6);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .3s;font-size:16px;}
.icon-btn.active{background:rgba(245,200,66,.15);border-color:rgba(245,200,66,.4);}
.icon-btn svg{width:16px;height:16px;}

/* ── RESULT OVERLAY ── */
#result-overlay{position:fixed;inset:0;z-index:50;background:rgba(0,0,0,.88);backdrop-filter:blur(16px);display:none;align-items:center;justify-content:center;padding:20px;}
#result-overlay.show{display:flex;}
.rcard{max-width:320px;width:100%;border-radius:20px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.7);animation:popIn .4s cubic-bezier(.34,1.56,.64,1) forwards;}
@keyframes popIn{from{opacity:0;transform:translateY(50px) scale(.9);}to{opacity:1;transform:translateY(0) scale(1);}}
.rcard-top{padding:20px 20px 16px;text-align:center;}
.rcard-icon{font-size:60px;line-height:1;margin-bottom:8px;}
.rcard-wave{display:flex;align-items:flex-end;justify-content:center;gap:3px;height:22px;margin-bottom:2px;}
.rcard-wave span{width:4px;border-radius:2px;height:4px;background:var(--green);}
.rcard-wave.on span:nth-child(1){animation:wbar .6s ease-in-out infinite;}
.rcard-wave.on span:nth-child(2){animation:wbar .8s ease-in-out infinite .1s;}
.rcard-wave.on span:nth-child(3){animation:wbar .7s ease-in-out infinite .2s;}
.rcard-wave.on span:nth-child(4){animation:wbar .9s ease-in-out infinite .05s;}
.rcard-wave.on span:nth-child(5){animation:wbar .65s ease-in-out infinite .15s;}
@keyframes wbar{0%,100%{height:4px;}50%{height:20px;}}
.rcard-body{background:var(--dark2);padding:18px 18px 20px;text-align:center;}
.rcard-status{font-size:14px;font-weight:900;letter-spacing:4px;text-transform:uppercase;margin-bottom:10px;}
.rcard-name{font-size:22px;font-weight:700;color:#fff;margin-bottom:6px;line-height:1.2;}
.rcard-id{display:inline-block;background:rgba(245,200,66,.1);border:1px solid rgba(245,200,66,.25);border-radius:20px;padding:3px 12px;font-family:monospace;font-size:11px;color:var(--gold);letter-spacing:3px;margin-bottom:8px;}
.rcard-sub{font-size:11px;color:rgba(255,255,255,.38);line-height:1.6;}

/* themes */
.theme-ok .rcard-top{background:linear-gradient(135deg,#091a0f,#0d2a18);}
.theme-ok .rcard-status{color:var(--green);}
.theme-warn .rcard-top{background:linear-gradient(135deg,#1a1a08,#2a280a);}
.theme-warn .rcard-status{color:var(--gold);}
.theme-err .rcard-top{background:linear-gradient(135deg,#1a0808,#2a0d0d);}
.theme-err .rcard-status{color:var(--coral);}
.theme-wait .rcard-top{background:var(--dark3);}
.theme-wait .rcard-status{color:rgba(255,255,255,.4);}

/* SPEAK BAR */
#speak-bar{position:fixed;bottom:70px;left:50%;transform:translateX(-50%);background:rgba(37,211,102,.12);border:1px solid rgba(37,211,102,.25);border-radius:30px;padding:6px 14px;font-size:10px;letter-spacing:2px;color:var(--green);text-transform:uppercase;display:none;align-items:center;gap:6px;z-index:60;white-space:nowrap;}
#speak-bar.on{display:flex;}

/* TOAST */
#toast{position:fixed;top:70px;left:50%;transform:translateX(-50%);background:rgba(255,87,51,.9);border-radius:20px;padding:8px 18px;font-size:12px;letter-spacing:1px;color:#fff;z-index:100;display:none;white-space:nowrap;}
#toast.on{display:block;animation:toastAnim 3s forwards;}
@keyframes toastAnim{0%{opacity:0;transform:translateX(-50%) translateY(-10px);}15%{opacity:1;transform:translateX(-50%) translateY(0);}75%{opacity:1;}100%{opacity:0;}}

@media(max-width:360px){.scan-box{width:210px;height:210px;}.rcard-name{font-size:18px;}}
</style>
</head>
<body>

<!-- ══ PIN SCREEN ══ -->
<div class="screen active" id="pin-screen">
  <div class="brand">
    <h1>GAANA BAJAANA</h1>
    <p>🤖 Robo Check-In · Edition 2</p>
  </div>
  <div class="pin-card">
    <div class="lock">🔐</div>
    <h2>Enter Organizer PIN</h2>
    <input class="pin-input" type="number" id="pin-inp" placeholder="·  ·  ·  ·"
           maxlength="4" inputmode="numeric" autocomplete="off">
    <button class="pin-btn" id="start-btn" onclick="startCheckin()">START CHECK-IN →</button>
    <div class="pin-msg" id="pin-msg"></div>
  </div>
</div>

<!-- ══ SCANNER SCREEN ══ -->
<div class="screen" id="scanner-screen">
  <video id="video" playsinline autoplay muted></video>
  <canvas id="canvas"></canvas>

  <div class="scan-frame">
    <div class="scan-box">
      <div class="corner tl"></div>
      <div class="corner tr"></div>
      <div class="corner bl"></div>
      <div class="corner br"></div>
      <div class="scan-line"></div>
      <div class="scan-label" id="scan-label">Align QR inside the frame</div>
    </div>
  </div>

  <div class="scan-header">
    <div class="scan-logo">GAANA BAJAANA</div>
    <div class="scan-status">
      <div class="sdot"></div>
      <div class="stxt" id="scan-stxt">Scanning</div>
    </div>
    <button class="exit-btn" onclick="stopCheckin()">✕ Exit</button>
  </div>

  <div class="scan-footer">
    <div class="count-box">
      <div class="count-lbl">Checked In</div>
      <div class="count-num" id="count-num">0</div>
    </div>
    <div class="btn-group">
      <div class="icon-btn" id="torch-btn" onclick="toggleTorch()" title="Flashlight">🔦</div>
      <div class="icon-btn" id="vol-btn" onclick="toggleVoice()" title="Voice">
        <svg id="ico-vol-on" viewBox="0 0 24 24" fill="rgba(255,255,255,.65)"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
        <svg id="ico-vol-off" viewBox="0 0 24 24" fill="var(--coral)" style="display:none"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>
      </div>
    </div>
  </div>
</div>

<!-- ══ RESULT CARD ══ -->
<div id="result-overlay" onclick="dismissResult()">
  <div class="rcard" id="rcard" onclick="event.stopPropagation()">
    <div class="rcard-top" id="rcard-top">
      <div class="rcard-icon" id="rcard-icon">🎵</div>
      <div class="rcard-wave" id="rcard-wave">
        <span></span><span></span><span></span><span></span><span></span>
      </div>
    </div>
    <div class="rcard-body">
      <div class="rcard-status" id="rcard-status">WELCOME!</div>
      <div class="rcard-name"   id="rcard-name">Loading...</div>
      <div class="rcard-id"     id="rcard-id">GB2-000</div>
      <div class="rcard-sub"    id="rcard-sub"></div>
    </div>
  </div>
</div>

<div id="speak-bar">🎤 Speaking...</div>
<div id="toast" id="toast"></div>

<!-- jsQR — reliable QR decoder -->
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>

<script>
/* ════════════════════════════════════════════════════════
   CONFIGURATION — update these if anything changes
════════════════════════════════════════════════════════ */
const APP_URL    = 'https://script.google.com/macros/s/AKfycbyZJMnn98BL3pYQZZqPVDcNpOqxMUklKlmqVE-kr6dURiLsyYn2zz1YuAvfjpIYMZs_/exec';
const FB_ID      = 'gaana-bajaana-9210f';
const ORG_PIN    = '55';
const EVENT_NAME = 'Gaana Bajaana Edition 2';

/* ════════════════════════════════════════════════════════
   STATE
════════════════════════════════════════════════════════ */
let stream       = null;
let scanning     = false;
let raf          = null;
let busy         = false;          // prevent concurrent scans
let lastQR       = '';
let lastQRTime   = 0;
const DEBOUNCE   = 8000;           // ms before same QR allowed again

let voiceOn      = true;
let torchTrack   = null;
let torchState   = false;
let checkinCount = 0;
let cardTimer    = null;
let synth        = window.speechSynthesis;
let voiceList    = [];

/* ════════════════════════════════════════════════════════
   PIN SCREEN
════════════════════════════════════════════════════════ */
document.getElementById('pin-inp').addEventListener('keydown', e => {
  if (e.key === 'Enter') startCheckin();
});

async function startCheckin() {
  const pin = document.getElementById('pin-inp').value.trim();

  if (!pin) {
    pinMsg('Enter the organizer PIN.', 'err');
    return;
  }
  if (pin !== ORG_PIN) {
    pinMsg('Wrong PIN — try again.', 'err');
    document.getElementById('pin-inp').value = '';
    document.getElementById('pin-inp').focus();
    return;
  }

  pinMsg('Starting camera…', 'ok');
  document.getElementById('start-btn').disabled = true;

  // Unlock speech synthesis with a silent utterance on user gesture
  unlockSpeech();

  // Load voices
  loadVoices();

  // Request camera
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode : { ideal: 'environment' },
        width      : { ideal: 1280 },
        height     : { ideal: 720 }
      },
      audio: false
    });
  } catch(err) {
    // Fallback: try any camera
    try {
      stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
    } catch(e2) {
      pinMsg('Camera access denied. Enable camera and retry.', 'err');
      document.getElementById('start-btn').disabled = false;
      return;
    }
  }

  // Attach stream to video
  const vid = document.getElementById('video');
  vid.srcObject = stream;

  // Get torch track ref
  const tracks = stream.getVideoTracks();
  if (tracks.length) torchTrack = tracks[0];

  // Load check-in count from Firebase
  loadFBCount();

  // Switch screen
  showScreen('scanner-screen');

  // Start scanning after video is ready
  vid.onloadedmetadata = () => {
    vid.play().catch(() => {});
    scanning = true;
    raf = requestAnimationFrame(scanLoop);
  };

  // Fallback if onloadedmetadata already fired
  if (vid.readyState >= 2) {
    vid.play().catch(() => {});
    scanning = true;
    raf = requestAnimationFrame(scanLoop);
  }
}

function pinMsg(text, type) {
  const el = document.getElementById('pin-msg');
  el.textContent = text;
  el.className = 'pin-msg ' + type;
  el.style.display = 'block';
}

function stopCheckin() {
  scanning = false;
  if (raf) { cancelAnimationFrame(raf); raf = null; }
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
  synth.cancel();
  dismissResult();
  showScreen('pin-screen');
  document.getElementById('start-btn').disabled = false;
  document.getElementById('pin-msg').style.display = 'none';
  document.getElementById('pin-inp').value = '';
  setScanStatus('Scanning');
}

/* ════════════════════════════════════════════════════════
   SCAN LOOP — runs on every animation frame
════════════════════════════════════════════════════════ */
function scanLoop() {
  if (!scanning) return;

  const vid = document.getElementById('video');
  const cvs = document.getElementById('canvas');
  const ctx = cvs.getContext('2d', { willReadFrequently: true });

  if (vid.readyState === vid.HAVE_ENOUGH_DATA && vid.videoWidth > 0) {
    cvs.width  = vid.videoWidth;
    cvs.height = vid.videoHeight;
    ctx.drawImage(vid, 0, 0, cvs.width, cvs.height);

    try {
      const px   = ctx.getImageData(0, 0, cvs.width, cvs.height);
      const code = jsQR(px.data, px.width, px.height, {
        inversionAttempts: 'attemptBoth'  // handles both light and dark QR codes
      });

      if (code && code.data) {
        const now = Date.now();
        const same = (code.data === lastQR) && ((now - lastQRTime) < DEBOUNCE);
        if (!same && !busy) {
          lastQR     = code.data;
          lastQRTime = now;
          processQR(code.data);
        }
      }
    } catch(e) { /* continue */ }
  }

  raf = requestAnimationFrame(scanLoop);
}

/* ════════════════════════════════════════════════════════
   PROCESS QR CODE
   Existing QR codes contain the full Apps Script URL:
   https://script.google.com/macros/s/.../exec?id=GB2-001
   New ones will too. We extract the `id` param.
════════════════════════════════════════════════════════ */
async function processQR(qrText) {
  // Extract reg ID from the QR content
  let regId = '';

  try {
    // QR contains full URL — extract id param
    const u = new URL(qrText);
    regId = (u.searchParams.get('id') || '').trim();
  } catch(e) {
    // QR might contain just the reg ID directly
    const plain = qrText.trim();
    if (/^GB/i.test(plain)) regId = plain;
  }

  if (!regId) {
    // Not a GB QR code — ignore silently (don't show error for random QRs)
    return;
  }

  busy = true;
  setScanStatus('Verifying...');
  showCard('wait', '⏳', false, 'CHECKING...', 'Please wait', regId, '', 0);

  try {
    // Append &format=json so Apps Script returns JSON instead of HTML
    // This FIXES the CORS error — JSON responses are allowed cross-origin
    const url  = APP_URL + '?id=' + encodeURIComponent(regId) + '&format=json';
    const resp = await fetch(url, { redirect: 'follow' });

    if (!resp.ok) throw new Error('HTTP ' + resp.status);

    const text = await resp.text();

    // Parse JSON
    let data;
    try {
      data = JSON.parse(text);
    } catch(e) {
      // Response wasn't JSON — try to infer status from HTML text
      data = inferFromHTML(text, regId);
    }

    handleAPIResult(data, regId);

  } catch(err) {
    console.error('Fetch error:', err);
    // Show a non-blocking error — the sheet was likely updated
    showCard('err', '📶', false, 'CHECK SHEET', 'Network issue', regId,
      'Attendance may be marked. Verify in Google Sheets.', 5000);
    speak('Connection issue. Please verify in the sheet.');
    setScanStatus('Network Error');
    setTimeout(() => setScanStatus('Scanning'), 5000);
  }

  setTimeout(() => { busy = false; }, 500);
}

/* If Apps Script returns HTML instead of JSON, infer status from content */
function inferFromHTML(html, regId) {
  const lc = html.toLowerCase();
  if (lc.includes('welcome') || lc.includes('marked present') || lc.includes('enjoy'))
    return { status: 'success', name: extractName(html), regId };
  if (lc.includes('already checked') || lc.includes('already been'))
    return { status: 'already_checked', name: extractName(html), regId };
  if (lc.includes('not found'))
    return { status: 'not_found', regId };
  if (lc.includes('wrong pin') || lc.includes('incorrect pin'))
    return { status: 'wrong_pin', regId };
  return { status: 'success', name: '', regId }; // assume success if sheet updated
}

function extractName(html) {
  const m = html.match(/<strong[^>]*>([A-Za-z\s]{2,40})<\/strong>/i);
  return m ? m[1].trim() : '';
}

/* ════════════════════════════════════════════════════════
   HANDLE API RESULT
════════════════════════════════════════════════════════ */
function handleAPIResult(data, regId) {
  const now = new Date().toLocaleTimeString('en-IN', { hour:'2-digit', minute:'2-digit', hour12:true });

  switch((data.status || '').toLowerCase()) {

    case 'success':
      checkinCount++;
      updateCount();
      showCard('ok', '🎵', true, 'WELCOME!',
        data.name || 'Guest', regId,
        'Entry confirmed · ' + (data.time || now), 6000);
      speak(welcomeMsg(data.name));
      setScanStatus('✓ Checked In');
      setTimeout(() => setScanStatus('Scanning'), 6000);
      break;

    case 'already_checked':
    case 'already checked':
      showCard('warn', '⚠️', false, 'ALREADY IN',
        data.name || regId, regId,
        'This QR was already used for entry today.', 4000);
      speak((data.name || 'This person') + ' has already checked in.');
      setScanStatus('Already In');
      setTimeout(() => setScanStatus('Scanning'), 4000);
      break;

    case 'not_found':
      showCard('err', '❓', false, 'NOT FOUND',
        'Registration not found', regId,
        'Contact team if this is a valid pass.', 4000);
      speak('Registration not found. Please contact the event team.');
      setScanStatus('Not Found');
      setTimeout(() => setScanStatus('Scanning'), 4000);
      break;

    case 'invalid':
      // Not a GB pass — ignore
      dismissResult();
      setScanStatus('Scanning');
      break;

    default:
      // Unknown — show success (Apps Script likely updated the sheet)
      if (data.name) {
        checkinCount++;
        updateCount();
        showCard('ok', '🎵', true, 'WELCOME!',
          data.name, regId, 'Entry confirmed · ' + now, 6000);
        speak(welcomeMsg(data.name));
        setScanStatus('✓ Checked In');
        setTimeout(() => setScanStatus('Scanning'), 6000);
      } else {
        dismissResult();
        setScanStatus('Scanning');
      }
  }
}

/* ════════════════════════════════════════════════════════
   RESULT CARD
════════════════════════════════════════════════════════ */
function showCard(theme, icon, wave, status, name, id, sub, autoDismiss) {
  document.getElementById('rcard').className         = 'rcard theme-' + theme;
  document.getElementById('rcard-icon').textContent  = icon;
  document.getElementById('rcard-status').textContent = status;
  document.getElementById('rcard-name').textContent  = name;
  document.getElementById('rcard-id').textContent    = id;
  document.getElementById('rcard-id').style.display  = id ? 'inline-block' : 'none';
  document.getElementById('rcard-sub').textContent   = sub;
  document.getElementById('rcard-wave').className    = 'rcard-wave' + (wave ? ' on' : '');
  document.getElementById('result-overlay').classList.add('show');
  clearTimeout(cardTimer);
  if (autoDismiss > 0) cardTimer = setTimeout(dismissResult, autoDismiss);
}

function dismissResult() {
  document.getElementById('result-overlay').classList.remove('show');
  clearTimeout(cardTimer);
}

/* ════════════════════════════════════════════════════════
   VOICE — Web Speech API
════════════════════════════════════════════════════════ */
function unlockSpeech() {
  // Fire a zero-length utterance on user gesture to unlock speech on iOS/Android
  if (!synth) return;
  const u  = new SpeechSynthesisUtterance('');
  u.volume = 0;
  synth.speak(u);
}

function loadVoices() {
  voiceList = synth.getVoices();
  if (!voiceList.length) {
    synth.addEventListener('voiceschanged', () => {
      voiceList = synth.getVoices();
    });
  }
}

function getBestVoice() {
  return voiceList.find(v => v.lang === 'en-IN')
      || voiceList.find(v => v.lang === 'en-US')
      || voiceList.find(v => v.lang.startsWith('en'))
      || voiceList[0]
      || null;
}

function speak(text) {
  if (!voiceOn || !synth) return;
  synth.cancel();

  const say = () => {
    const utt   = new SpeechSynthesisUtterance(text);
    utt.lang    = 'en-IN';
    utt.rate    = 0.9;
    utt.pitch   = 1.0;
    utt.volume  = 1.0;
    const v     = getBestVoice();
    if (v) utt.voice = v;

    utt.onstart = () => document.getElementById('speak-bar').classList.add('on');
    utt.onend   = () => document.getElementById('speak-bar').classList.remove('on');
    utt.onerror = () => document.getElementById('speak-bar').classList.remove('on');

    synth.speak(utt);
  };

  // If voices not loaded yet, wait briefly
  if (!voiceList.length) {
    setTimeout(() => { voiceList = synth.getVoices(); say(); }, 300);
  } else {
    say();
  }
}

function welcomeMsg(name) {
  const n = name || '';
  const msgs = [
    `Welcome to ${EVENT_NAME}${n ? ', ' + n : ''}! Your entry is confirmed. Enjoy the music!`,
    `${n ? n + ', you are in! ' : 'Entry confirmed! '}Welcome to ${EVENT_NAME}. Get ready to sing and vibe!`,
    `${n ? 'Hello ' + n + '! ' : ''}Entry confirmed. Welcome to ${EVENT_NAME}. Enjoy the jam tonight!`,
    `${n ? n + ', welcome! ' : 'Welcome! '}Your pass is verified. Have an amazing time at ${EVENT_NAME}!`,
  ];
  return msgs[Math.floor(Math.random() * msgs.length)];
}

function toggleVoice() {
  voiceOn = !voiceOn;
  document.getElementById('ico-vol-on').style.display  = voiceOn ? 'block' : 'none';
  document.getElementById('ico-vol-off').style.display = voiceOn ? 'none'  : 'block';
  document.getElementById('vol-btn').classList.toggle('active', !voiceOn);
  if (!voiceOn) synth.cancel();
}

/* ════════════════════════════════════════════════════════
   TORCH
════════════════════════════════════════════════════════ */
async function toggleTorch() {
  if (!torchTrack) return;
  try {
    torchState = !torchState;
    await torchTrack.applyConstraints({ advanced: [{ torch: torchState }] });
    document.getElementById('torch-btn').classList.toggle('active', torchState);
  } catch(e) {
    torchState = false;
    showToast('Torch not supported on this device');
  }
}

/* ════════════════════════════════════════════════════════
   FIREBASE — load check-in count
════════════════════════════════════════════════════════ */
async function loadFBCount() {
  try {
    const r = await fetch(
      `https://firestore.googleapis.com/v1/projects/${FB_ID}/databases/(default)/documents/config/event`
    );
    const d = await r.json();
    if (d.fields?.checkInCount?.integerValue !== undefined) {
      checkinCount = parseInt(d.fields.checkInCount.integerValue);
      updateCount();
    }
  } catch(e) { /* use 0 */ }
}

function updateCount() {
  document.getElementById('count-num').textContent = checkinCount;
}

/* ════════════════════════════════════════════════════════
   UTILS
════════════════════════════════════════════════════════ */
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function setScanStatus(txt) {
  document.getElementById('scan-stxt').textContent = txt;
}

function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'on';
  setTimeout(() => el.className = '', 3100);
}

/* Screen wake lock — keeps screen on */
async function keepScreenOn() {
  if ('wakeLock' in navigator) {
    try { await navigator.wakeLock.request('screen'); } catch(e) {}
  }
}
keepScreenOn();
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') keepScreenOn();
});

/* Load voices on page load */
window.addEventListener('load', () => {
  if (synth) {
    voiceList = synth.getVoices();
    synth.addEventListener('voiceschanged', () => { voiceList = synth.getVoices(); });
  }
});
</script>
