<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Gaana Bajaana — Robo Check-In</title>
<style>
:root{
  --gold:#F5C842;--coral:#FF5733;--green:#25D366;
  --dark:#070709;--dark2:#0E0E12;--dark3:#13131A;
  --border:rgba(255,255,255,0.07);
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;background:var(--dark);color:#fff;font-family:-apple-system,Arial,sans-serif;overflow:hidden;}

/* ── SCREENS ── */
.screen{display:none;position:fixed;inset:0;flex-direction:column;align-items:center;justify-content:center;padding:24px;z-index:10;}
.screen.active{display:flex;}

/* ── PIN SCREEN ── */
#pin-screen{background:var(--dark);}
.brand-top{text-align:center;margin-bottom:32px;}
.brand-top h1{font-size:28px;font-weight:900;letter-spacing:6px;background:linear-gradient(135deg,var(--gold),var(--coral));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.brand-top p{font-size:11px;letter-spacing:3px;color:rgba(255,255,255,0.4);margin-top:6px;text-transform:uppercase;}
.pin-box{background:var(--dark2);border:1px solid var(--border);border-radius:20px;padding:32px 28px;width:min(380px,100%);text-align:center;}
.pin-box h2{font-size:14px;letter-spacing:3px;color:rgba(255,255,255,0.4);text-transform:uppercase;margin-bottom:6px;}
.pin-box .lock{font-size:48px;margin-bottom:16px;line-height:1;}
.pin-input{width:100%;background:var(--dark3);border:1px solid var(--border);border-radius:12px;padding:18px;color:#fff;font-size:28px;text-align:center;letter-spacing:12px;outline:none;font-family:monospace;-moz-appearance:textfield;margin-bottom:14px;}
.pin-input::-webkit-outer-spin-button,.pin-input::-webkit-inner-spin-button{-webkit-appearance:none;}
.pin-input:focus{border-color:rgba(245,200,66,0.6);}
.pin-btn{width:100%;background:linear-gradient(135deg,var(--gold),var(--coral));border:none;border-radius:12px;padding:15px;font-size:15px;font-weight:bold;color:#000;letter-spacing:2px;cursor:pointer;text-transform:uppercase;}
.pin-btn:active{opacity:0.85;}
.pin-error{font-size:12px;color:var(--coral);margin-top:10px;display:none;letter-spacing:1px;}

/* ── SCANNER SCREEN ── */
#scanner-screen{background:#000;padding:0;}
.scanner-header{position:fixed;top:0;left:0;right:0;z-index:20;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;background:linear-gradient(to bottom,rgba(0,0,0,0.9),transparent);}
.scanner-header .logo{font-size:16px;font-weight:900;letter-spacing:4px;background:linear-gradient(135deg,var(--gold),var(--coral));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.scanner-header .status-dot{width:10px;height:10px;background:var(--green);border-radius:50%;animation:pulse 1.5s ease-in-out infinite;display:inline-block;margin-right:6px;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.5;transform:scale(1.4);}}
.scanner-header .status-txt{font-size:11px;letter-spacing:2px;color:rgba(255,255,255,0.6);text-transform:uppercase;}
.logout-link{font-size:11px;color:rgba(255,255,255,0.3);cursor:pointer;letter-spacing:1px;background:none;border:none;}

/* VIDEO */
#video-container{position:fixed;inset:0;}
#video{width:100%;height:100%;object-fit:cover;display:block;}
#canvas{display:none;}

/* SCAN OVERLAY */
.scan-overlay{position:fixed;inset:0;z-index:15;pointer-events:none;}
.scan-overlay::before{
  content:'';position:absolute;inset:0;
  background:rgba(0,0,0,0.55);
  -webkit-mask:
    linear-gradient(#000,#000) top/100% calc(50% - 130px),
    linear-gradient(#000,#000) bottom/100% calc(50% - 130px),
    linear-gradient(#000,#000) left/calc(50% - 130px) 100%,
    linear-gradient(#000,#000) right/calc(50% - 130px) 100%;
  -webkit-mask-composite:destination-out;
  mask-composite:exclude;
  mask:
    linear-gradient(#000,#000) top/100% calc(50% - 130px),
    linear-gradient(#000,#000) bottom/100% calc(50% - 130px),
    linear-gradient(#000,#000) left/calc(50% - 130px) 100%,
    linear-gradient(#000,#000) right/calc(50% - 130px) 100%;
}
.scan-box{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:260px;height:260px;
}
.scan-box::before,.scan-box::after{
  content:'';position:absolute;
  width:36px;height:36px;
  border-color:var(--gold);
  border-style:solid;
}
.scan-box::before{top:0;left:0;border-width:3px 0 0 3px;border-radius:4px 0 0 0;}
.scan-box::after{bottom:0;right:0;border-width:0 3px 3px 0;border-radius:0 0 4px 0;}
.scan-box-inner::before,.scan-box-inner::after{
  content:'';position:absolute;
  width:36px;height:36px;
  border-color:var(--gold);
  border-style:solid;
}
.scan-box-inner::before{top:0;right:0;border-width:3px 3px 0 0;border-radius:0 4px 0 0;}
.scan-box-inner::after{bottom:0;left:0;border-width:0 0 3px 3px;border-radius:0 0 0 4px;}
.scan-line{
  position:absolute;
  left:4px;right:4px;
  height:2px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
  top:0;
  animation:scan-move 2s ease-in-out infinite;
  box-shadow:0 0 8px var(--gold);
}
@keyframes scan-move{0%,100%{top:4px;opacity:1;}50%{top:252px;opacity:0.7;}}
.scan-hint{
  position:absolute;
  bottom:-42px;left:50%;transform:translateX(-50%);
  font-size:12px;letter-spacing:2px;color:rgba(255,255,255,0.5);
  white-space:nowrap;text-transform:uppercase;
}
.scan-counter{
  position:fixed;bottom:28px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,0.7);border:1px solid var(--border);
  border-radius:40px;padding:8px 20px;
  font-size:12px;letter-spacing:2px;color:rgba(255,255,255,0.4);
  text-transform:uppercase;z-index:20;
  display:flex;align-items:center;gap:12px;
}
.scan-counter strong{font-family:monospace;color:var(--gold);font-size:18px;}

/* ── RESULT OVERLAY ── */
#result-overlay{
  position:fixed;inset:0;z-index:50;
  display:none;align-items:center;justify-content:center;padding:24px;
  background:rgba(0,0,0,0.92);
  backdrop-filter:blur(12px);
}
#result-overlay.show{display:flex;}
.result-card{
  max-width:360px;width:100%;
  border-radius:24px;overflow:hidden;
  box-shadow:0 24px 64px rgba(0,0,0,0.7);
  animation:slideUp 0.4s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes slideUp{from{opacity:0;transform:translateY(60px) scale(0.9);}to{opacity:1;transform:translateY(0) scale(1);}}
.result-card .card-top{padding:20px 24px;text-align:center;}
.result-card .card-body{padding:28px 24px 24px;background:var(--dark2);text-align:center;}
.result-icon{font-size:72px;line-height:1;margin-bottom:12px;}
.result-status{font-size:18px;font-weight:900;letter-spacing:4px;text-transform:uppercase;margin-bottom:16px;}
.result-name{font-size:28px;font-weight:700;color:#fff;margin-bottom:8px;}
.result-id{display:inline-block;background:rgba(245,200,66,0.12);border:1px solid rgba(245,200,66,0.3);border-radius:20px;padding:5px 16px;font-family:monospace;font-size:13px;color:var(--gold);letter-spacing:3px;margin-bottom:16px;}
.result-time{font-size:12px;color:rgba(255,255,255,0.4);letter-spacing:1px;margin-bottom:20px;}
.result-wave{display:flex;align-items:flex-end;gap:4px;justify-content:center;height:32px;margin-bottom:16px;}
.result-wave span{width:5px;border-radius:3px;background:var(--green);}
.result-wave.active span:nth-child(1){animation:wv 0.6s ease-in-out infinite;}
.result-wave.active span:nth-child(2){animation:wv 0.8s ease-in-out infinite 0.1s;}
.result-wave.active span:nth-child(3){animation:wv 0.7s ease-in-out infinite 0.2s;}
.result-wave.active span:nth-child(4){animation:wv 0.9s ease-in-out infinite 0.05s;}
.result-wave.active span:nth-child(5){animation:wv 0.65s ease-in-out infinite 0.15s;}
@keyframes wv{0%,100%{height:4px;}50%{height:28px;}}
.result-msg{font-size:13px;color:rgba(255,255,255,0.5);line-height:1.6;margin-bottom:6px;}
/* success */
.card-success .card-top{background:linear-gradient(135deg,#1a3a28,#0d2018);}
.card-success .result-status{color:var(--green);}
/* already in */
.card-already .card-top{background:linear-gradient(135deg,#3a3010,#201c08);}
.card-already .result-status{color:var(--gold);}
/* not found */
.card-error .card-top{background:linear-gradient(135deg,#3a1010,#200808);}
.card-error .result-status{color:var(--coral);}

/* SPEAKING INDICATOR */
.speaking-bar{
  position:fixed;bottom:80px;left:50%;transform:translateX(-50%);
  background:rgba(37,211,102,0.15);border:1px solid rgba(37,211,102,0.3);
  border-radius:30px;padding:8px 18px;font-size:11px;letter-spacing:2px;
  color:var(--green);text-transform:uppercase;
  display:none;align-items:center;gap:8px;z-index:60;
}
.speaking-bar.show{display:flex;}
.speaking-bar svg{width:16px;height:16px;fill:var(--green);flex-shrink:0;}

/* VOLUME TOGGLE */
.vol-btn{
  position:fixed;top:60px;right:16px;z-index:25;
  width:40px;height:40px;border-radius:50%;
  background:rgba(0,0,0,0.6);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  transition:all 0.3s;
}
.vol-btn:hover{border-color:rgba(245,200,66,0.4);}
.vol-btn svg{width:18px;height:18px;}

/* TORCH TOGGLE */
.torch-btn{
  position:fixed;top:60px;right:64px;z-index:25;
  width:40px;height:40px;border-radius:50%;
  background:rgba(0,0,0,0.6);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  transition:all 0.3s;font-size:18px;
}
.torch-btn.on{background:rgba(245,200,66,0.2);border-color:rgba(245,200,66,0.5);}

@media(max-width:400px){
  .scan-box{width:220px;height:220px;}
  .result-name{font-size:22px;}
}
</style>
</head>
<body>

<!-- ══════════════════════════════════════════
     PIN SCREEN
═══════════════════════════════════════════ -->
<div class="screen active" id="pin-screen">
  <div class="brand-top">
    <h1>GAANA BAJAANA</h1>
    <p>Robo Check-In System 🤖</p>
  </div>
  <div class="pin-box">
    <div class="lock">🔐</div>
    <h2>Organizer PIN</h2>
    <input
      class="pin-input"
      type="number"
      id="pin-input"
      placeholder="· · · ·"
      maxlength="4"
      inputmode="numeric"
      autocomplete="off"
    >
    <button class="pin-btn" onclick="startScanner()">Start Check-In →</button>
    <div class="pin-error" id="pin-error">Please enter the organizer PIN.</div>
  </div>
</div>

<!-- ══════════════════════════════════════════
     SCANNER SCREEN
═══════════════════════════════════════════ -->
<div class="screen" id="scanner-screen">
  <!-- Camera feed -->
  <div id="video-container">
    <video id="video" playsinline autoplay muted></video>
    <canvas id="canvas"></canvas>
  </div>

  <!-- Scan frame overlay -->
  <div class="scan-overlay">
    <div class="scan-box">
      <div class="scan-box-inner"></div>
      <div class="scan-line"></div>
      <div class="scan-hint">Point camera at QR code</div>
    </div>
  </div>

  <!-- Header -->
  <div class="scanner-header">
    <div class="logo">GAANA BAJAANA</div>
    <div style="display:flex;align-items:center;gap:14px;">
      <div><span class="status-dot"></span><span class="status-txt" id="scan-status-txt">Scanning</span></div>
      <button class="logout-link" onclick="stopScanner()">✕ Exit</button>
    </div>
  </div>

  <!-- Torch & volume buttons -->
  <button class="torch-btn" id="torch-btn" onclick="toggleTorch()" title="Toggle flashlight">🔦</button>
  <button class="vol-btn" id="vol-btn" onclick="toggleVoice()" title="Toggle voice">
    <svg id="vol-icon-on" viewBox="0 0 24 24" fill="rgba(255,255,255,0.6)"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
    <svg id="vol-icon-off" viewBox="0 0 24 24" fill="var(--coral)" style="display:none"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>
  </button>

  <!-- Bottom counter bar -->
  <div class="scan-counter">
    <span>Checked In Today</span>
    <strong id="checkin-count-display">0</strong>
  </div>
</div>

<!-- ══════════════════════════════════════════
     RESULT OVERLAY
═══════════════════════════════════════════ -->
<div id="result-overlay">
  <div class="result-card" id="result-card">
    <div class="card-top" id="result-top">
      <div class="result-icon" id="result-icon">🎵</div>
      <div class="result-wave" id="result-wave">
        <span></span><span></span><span></span><span></span><span></span>
      </div>
    </div>
    <div class="card-body">
      <div class="result-status" id="result-status">WELCOME!</div>
      <div class="result-name" id="result-name">Loading...</div>
      <div class="result-id" id="result-id">GB2-000</div>
      <div class="result-time" id="result-time"></div>
      <div class="result-msg" id="result-msg"></div>
    </div>
  </div>
</div>

<!-- SPEAKING INDICATOR -->
<div class="speaking-bar" id="speaking-bar">
  <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/></svg>
  Robo speaking...
</div>

<!-- jsQR library for QR scanning -->
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>

<script>
/* ═══════════════════════════════════════════════════
   CONFIG — update these to match your setup
═══════════════════════════════════════════════════ */
const WEB_APP_URL   = 'https://script.google.com/macros/s/AKfycbyZJMnn98BL3pYQZZqPVDcNpOqxMUklKlmqVE-kr6dURiLsyYn2zz1YuAvfjpIYMZs_/exec';
const FIREBASE_ID   = 'gaana-bajaana-9210f';
const EVENT_NAME    = 'Gaana Bajaana Edition 2';

/* Voice config */
const VOICE_LANG    = 'en-IN'; // Indian English
const VOICE_RATE    = 0.92;
const VOICE_PITCH   = 1.05;

/* ═══════════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════════ */
let orgPin         = '';
let videoStream    = null;
let scanning       = true;
let lastScannedId  = '';
let lastScanTime   = 0;
let voiceEnabled   = true;
let torchOn        = false;
let torchTrack     = null;
let checkinCount   = 0;
let resultTimer    = null;
let synth          = window.speechSynthesis;
let voices         = [];
let scanActive     = false;
let animFrame      = null;

/* ═══════════════════════════════════════════════════
   PIN SCREEN
═══════════════════════════════════════════════════ */
document.getElementById('pin-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') startScanner();
});

async function startScanner() {
  const pin = document.getElementById('pin-input').value.trim();
  if (!pin) {
    document.getElementById('pin-error').style.display = 'block';
    return;
  }
  orgPin = pin;
  document.getElementById('pin-error').style.display = 'none';

  // Init voices
  loadVoices();

  // Start camera
  try {
    videoStream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: 'environment',
        width: { ideal: 1280 },
        height: { ideal: 720 }
      }
    });
    const video = document.getElementById('video');
    video.srcObject = videoStream;
    video.play();

    // Store torch track reference
    const tracks = videoStream.getVideoTracks();
    if (tracks.length) torchTrack = tracks[0];

    showScreen('scanner-screen');
    loadFirebaseCount();
    video.addEventListener('loadedmetadata', () => {
      scanActive = true;
      scanLoop();
    });
  } catch(err) {
    alert('Camera access denied. Please allow camera permissions and try again.\n\n' + err.message);
  }
}

function stopScanner() {
  if (videoStream) {
    videoStream.getTracks().forEach(t => t.stop());
    videoStream = null;
  }
  scanActive = false;
  if (animFrame) cancelAnimationFrame(animFrame);
  showScreen('pin-screen');
  hideResult();
}

/* ═══════════════════════════════════════════════════
   QR SCAN LOOP
═══════════════════════════════════════════════════ */
function scanLoop() {
  if (!scanActive) return;

  const video  = document.getElementById('video');
  const canvas = document.getElementById('canvas');
  const ctx    = canvas.getContext('2d');

  if (video.readyState === video.HAVE_ENOUGH_DATA) {
    canvas.width  = video.videoWidth;
    canvas.height = video.videoHeight;
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

    const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const code    = jsQR(imgData.data, imgData.width, imgData.height, {
      inversionAttempts: 'dontInvert'
    });

    if (code) {
      const qrText = code.data;
      const now    = Date.now();

      // Debounce — don't re-scan same code within 8 seconds
      if (qrText !== lastScannedId || now - lastScanTime > 8000) {
        lastScannedId = qrText;
        lastScanTime  = now;
        handleQR(qrText);
      }
    }
  }

  animFrame = requestAnimationFrame(scanLoop);
}

/* ═══════════════════════════════════════════════════
   HANDLE QR — extract regId and call Apps Script
═══════════════════════════════════════════════════ */
async function handleQR(qrText) {
  // Extract regId from the QR URL
  // QR contains: WEB_APP_URL?id=GB2-001
  let regId = '';
  try {
    const url    = new URL(qrText);
    regId        = url.searchParams.get('id') || '';
  } catch(e) {
    // Maybe plain reg ID was encoded directly
    if (qrText.startsWith('GB')) regId = qrText.trim();
  }

  if (!regId) {
    showResult('invalid');
    speak('Invalid QR code. Please try again.');
    return;
  }

  // Show processing state
  setStatusTxt('Processing...');
  showResult('loading', regId);

  try {
    // Call Apps Script with pin — same flow as organizer scanning phone
    const apiUrl  = `${WEB_APP_URL}?id=${encodeURIComponent(regId)}&pin=${encodeURIComponent(orgPin)}`;
    const resp    = await fetch(apiUrl, { redirect: 'follow' });
    const html    = await resp.text();

    // Parse result from returned HTML
    const result  = parseAppScriptResponse(html, regId);
    processResult(result, regId);

  } catch(err) {
    console.error('Check-in error:', err);
    showResult('error', regId);
    speak('There was a connection error. Please try again.');
    setStatusTxt('Scanning');
  }
}

/* Parse the HTML response returned by Apps Script doGet */
function parseAppScriptResponse(html, regId) {
  const lower = html.toLowerCase();
  if (lower.includes('welcome') || lower.includes('marked present') || lower.includes('enjoy the music')) {
    // Extract name if possible
    const nameMatch = html.match(/<strong[^>]*style[^>]*font-size:28px[^>]*>([^<]+)<\/strong>/i)
                   || html.match(/Welcome.*?<strong[^>]*>([^<]+)<\/strong>/i);
    const name = nameMatch ? nameMatch[1].trim() : '';
    return { type: 'success', name };
  }
  if (lower.includes('already checked') || lower.includes('already been used')) {
    const nameMatch = html.match(/<strong[^>]*font-size:22px[^>]*>([^<]+)<\/strong>/i);
    const name = nameMatch ? nameMatch[1].trim() : '';
    return { type: 'already', name };
  }
  if (lower.includes('wrong pin') || lower.includes('incorrect pin')) {
    return { type: 'wrong_pin' };
  }
  if (lower.includes('not found')) {
    return { type: 'not_found' };
  }
  return { type: 'error' };
}

/* ═══════════════════════════════════════════════════
   PROCESS CHECK-IN RESULT
═══════════════════════════════════════════════════ */
function processResult(result, regId) {
  const now = new Date();
  const timeStr = now.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit', hour12: true });

  switch(result.type) {

    case 'success':
      checkinCount++;
      updateCheckinDisplay();
      saveLocalCheckin(regId, result.name, timeStr);

      showResultCard({
        cardClass : 'card-success',
        icon      : '🎵',
        status    : 'WELCOME!',
        name      : result.name || 'Guest',
        id        : regId,
        time      : `✅ Checked in at ${timeStr}`,
        msg       : 'Entry confirmed. Enjoy the music tonight! 🎶',
        wave      : true,
        autoClose : 5000
      });

      speak(buildWelcomeMessage(result.name));
      setStatusTxt('✓ Checked In');
      setTimeout(() => setStatusTxt('Scanning'), 5000);
      break;

    case 'already':
      showResultCard({
        cardClass : 'card-already',
        icon      : '⚠️',
        status    : 'ALREADY IN',
        name      : result.name || regId,
        id        : regId,
        time      : `Entry was already used`,
        msg       : 'This QR pass was already scanned. Please contact team.',
        wave      : false,
        autoClose : 4000
      });
      speak(`This QR has already been used. ${result.name ? result.name + ' has' : 'This person has'} already entered.`);
      setStatusTxt('Already In');
      setTimeout(() => setStatusTxt('Scanning'), 4000);
      break;

    case 'wrong_pin':
      showResultCard({
        cardClass : 'card-error',
        icon      : '🔒',
        status    : 'WRONG PIN',
        name      : 'Access Denied',
        id        : regId,
        time      : '',
        msg       : 'The organizer PIN is incorrect. Please exit and re-enter.',
        wave      : false,
        autoClose : 5000
      });
      speak('Incorrect PIN. Please exit and enter the correct organizer PIN.');
      break;

    case 'not_found':
      showResultCard({
        cardClass : 'card-error',
        icon      : '❓',
        status    : 'NOT FOUND',
        name      : 'Registration Not Found',
        id        : regId,
        time      : '',
        msg       : 'This QR code is not in the system. Please contact team.',
        wave      : false,
        autoClose : 4000
      });
      speak('Registration not found. Please contact the event team.');
      setStatusTxt('Not Found');
      setTimeout(() => setStatusTxt('Scanning'), 4000);
      break;

    case 'invalid':
    default:
      showResultCard({
        cardClass : 'card-error',
        icon      : '❌',
        status    : 'INVALID QR',
        name      : 'Unrecognised Code',
        id        : '',
        time      : '',
        msg       : 'This QR code is not a Gaana Bajaana pass.',
        wave      : false,
        autoClose : 3000
      });
      speak('Invalid QR code.');
      setTimeout(() => setStatusTxt('Scanning'), 3000);
      break;
  }
}

/* ═══════════════════════════════════════════════════
   RESULT CARD
═══════════════════════════════════════════════════ */
function showResultCard({ cardClass, icon, status, name, id, time, msg, wave, autoClose }) {
  const overlay = document.getElementById('result-overlay');
  const card    = document.getElementById('result-card');
  const waveEl  = document.getElementById('result-wave');

  card.className         = 'result-card ' + cardClass;
  document.getElementById('result-icon').textContent   = icon;
  document.getElementById('result-status').textContent = status;
  document.getElementById('result-name').textContent   = name;
  document.getElementById('result-id').textContent     = id || '';
  document.getElementById('result-id').style.display   = id ? 'inline-block' : 'none';
  document.getElementById('result-time').textContent   = time;
  document.getElementById('result-msg').textContent    = msg;
  waveEl.className = 'result-wave' + (wave ? ' active' : '');

  overlay.classList.add('show');

  // Auto close
  clearTimeout(resultTimer);
  if (autoClose) {
    resultTimer = setTimeout(hideResult, autoClose);
  }
}

function showResult(type, regId) {
  if (type === 'loading') {
    showResultCard({
      cardClass : '',
      icon      : '⏳',
      status    : 'VERIFYING...',
      name      : 'Please wait',
      id        : regId,
      time      : 'Checking registration system',
      msg       : '',
      wave      : false,
      autoClose : 0
    });
  } else if (type === 'invalid') {
    processResult({ type: 'invalid' }, regId || '');
  } else if (type === 'error') {
    processResult({ type: 'error' }, regId || '');
  }
}

function hideResult() {
  document.getElementById('result-overlay').classList.remove('show');
  clearTimeout(resultTimer);
}

/* Close result on tap */
document.getElementById('result-overlay').addEventListener('click', () => {
  clearTimeout(resultTimer);
  hideResult();
});

/* ═══════════════════════════════════════════════════
   VOICE / SPEECH
═══════════════════════════════════════════════════ */
function loadVoices() {
  voices = synth.getVoices();
  if (!voices.length) {
    synth.addEventListener('voiceschanged', () => {
      voices = synth.getVoices();
    });
  }
}

function getPreferredVoice() {
  // Prefer Indian English, fallback to any English
  return voices.find(v => v.lang === 'en-IN')
      || voices.find(v => v.lang.startsWith('en-'))
      || voices[0]
      || null;
}

function speak(text) {
  if (!voiceEnabled || !synth) return;
  synth.cancel();
  const utt      = new SpeechSynthesisUtterance(text);
  utt.lang       = VOICE_LANG;
  utt.rate       = VOICE_RATE;
  utt.pitch      = VOICE_PITCH;
  utt.volume     = 1;
  const voice    = getPreferredVoice();
  if (voice) utt.voice = voice;
  utt.onstart    = () => document.getElementById('speaking-bar').classList.add('show');
  utt.onend      = () => document.getElementById('speaking-bar').classList.remove('show');
  utt.onerror    = () => document.getElementById('speaking-bar').classList.remove('show');
  synth.speak(utt);
}

function buildWelcomeMessage(name) {
  const greetings = [
    `Welcome to ${EVENT_NAME}, ${name}! Your entry is confirmed. Enjoy the music!`,
    `${name}, your entry is confirmed! Welcome to ${EVENT_NAME}. Have a great time!`,
    `Woohoo! ${name}, you're in! Welcome to ${EVENT_NAME}. Get ready to sing and vibe!`,
    `Hello ${name}! Entry confirmed. Welcome to ${EVENT_NAME}. Let's jam!`,
    `${name}, welcome to the jam! Your entry is confirmed. Enjoy ${EVENT_NAME}!`
  ];
  const base = name
    ? greetings[Math.floor(Math.random() * greetings.length)]
    : `Entry confirmed! Welcome to ${EVENT_NAME}. Enjoy the music!`;
  return base;
}

function toggleVoice() {
  voiceEnabled = !voiceEnabled;
  document.getElementById('vol-icon-on').style.display  = voiceEnabled ? 'block' : 'none';
  document.getElementById('vol-icon-off').style.display = voiceEnabled ? 'none'  : 'block';
  if (!voiceEnabled) synth.cancel();
  speak(voiceEnabled ? 'Voice enabled.' : '');
}

/* ═══════════════════════════════════════════════════
   TORCH
═══════════════════════════════════════════════════ */
async function toggleTorch() {
  if (!torchTrack) return;
  try {
    torchOn = !torchOn;
    await torchTrack.applyConstraints({ advanced: [{ torch: torchOn }] });
    document.getElementById('torch-btn').classList.toggle('on', torchOn);
  } catch(e) {
    alert('Torch not supported on this device.');
    torchOn = false;
  }
}

/* ═══════════════════════════════════════════════════
   FIREBASE — load & sync check-in count
═══════════════════════════════════════════════════ */
async function loadFirebaseCount() {
  try {
    const url  = `https://firestore.googleapis.com/v1/projects/${FIREBASE_ID}/databases/(default)/documents/config/event`;
    const res  = await fetch(url);
    const data = await res.json();
    if (data.fields && data.fields.checkInCount) {
      checkinCount = parseInt(data.fields.checkInCount.integerValue || 0);
      updateCheckinDisplay();
    }
  } catch(e) { /* offline, use local count */ }
}

function saveLocalCheckin(regId, name, time) {
  // Store locally for session reference
  const history = JSON.parse(sessionStorage.getItem('gb_checkins') || '[]');
  history.unshift({ regId, name, time });
  sessionStorage.setItem('gb_checkins', JSON.stringify(history.slice(0, 200)));
}

function updateCheckinDisplay() {
  document.getElementById('checkin-count-display').textContent = checkinCount;
}

/* ═══════════════════════════════════════════════════
   UTILS
═══════════════════════════════════════════════════ */
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function setStatusTxt(txt) {
  document.getElementById('scan-status-txt').textContent = txt;
}

/* Prevent screen sleep on supported browsers */
let wakeLock = null;
async function requestWakeLock() {
  try {
    if ('wakeLock' in navigator) {
      wakeLock = await navigator.wakeLock.request('screen');
    }
  } catch(e) {}
}
requestWakeLock();
document.addEventListener('visibilitychange', async () => {
  if (wakeLock && document.visibilityState === 'visible') requestWakeLock();
});

/* Load voices early */
window.addEventListener('load', () => {
  if (synth) loadVoices();
});
</script>
